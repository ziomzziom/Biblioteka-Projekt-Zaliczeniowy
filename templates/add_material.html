{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3 class="mb-0">Dodaj nowy materiał</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="typ" class="form-label">Typ materiału</label>
                        <select class="form-select" name="typ" id="typ" required onchange="toggleFields()">
                            <option value="">-- wybierz --</option>
                            <option value="ksiazka">Książka</option>
                            <option value="czasopismo">Czasopismo</option>
                            <option value="multimedia">Multimedia</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="tytul" class="form-label">Tytuł</label>
                        <input type="text" class="form-control" name="tytul" id="tytul" required>
                    </div>
                    <div class="mb-3">
                        <label for="autor" class="form-label">Autor</label>
                        <input type="text" class="form-control" name="autor" id="autor" required>
                    </div>
                    <div class="mb-3">
                        <label for="rok" class="form-label">Rok</label>
                        <input type="number" class="form-control" name="rok" id="rok" required>
                    </div>
                    <div class="mb-3">
                        <label for="sygnatura" class="form-label">Sygnatura</label>
                        <input type="text" class="form-control" name="sygnatura" id="sygnatura" required>
                    </div>

                    <div class="mb-3 d-none" id="field-liczba_stron">
                        <label for="liczba_stron" class="form-label">Liczba stron</label>
                        <input type="number" class="form-control" name="liczba_stron" id="liczba_stron">
                    </div>
                    <div class="mb-3 d-none" id="field-numer_wydania">
                        <label for="numer_wydania" class="form-label">Numer wydania</label>
                        <input type="number" class="form-control" name="numer_wydania" id="numer_wydania">
                    </div>
                    <div class="mb-3 d-none" id="field-czas_trwania">
                        <label for="czas_trwania" class="form-label">Czas trwania (min)</label>
                        <input type="number" class="form-control" name="czas_trwania" id="czas_trwania">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-info text-white">Dodaj materiał</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function toggleFields() {
    const typ = document.getElementById('typ').value;
    document.getElementById('field-liczba_stron').classList.toggle('d-none', typ !== 'ksiazka');
    document.getElementById('field-numer_wydania').classList.toggle('d-none', typ !== 'czasopismo');
    document.getElementById('field-czas_trwania').classList.toggle('d-none', typ !== 'multimedia');
}
</script>

{% endblock %}
