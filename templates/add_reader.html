{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h3 class="mb-0">Dodaj nowego czytelnika</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="imie" class="form-label">Imię</label>
                        <input type="text" class="form-control" name="imie" id="imie" required>
                    </div>
                    <div class="mb-3">
                        <label for="nazwisko" class="form-label">Nazwisko</label>
                        <input type="text" class="form-control" name="nazwisko" id="nazwisko" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">Dodaj czytelnika</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
